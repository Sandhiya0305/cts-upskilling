<!--
2. Navigation and Linking
Scenario: Users should navigate between "Home", "Events", and "Contact" sections.
Objective: Provide intuitive navigation and section-based references.
Task:
• Use <nav> with anchor tags <a href="#events">Events</a>
• Define matching IDs for each section like <section id="events">
• Add a link to an external help document using <a href="help.html" target="_blank">
-->

<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Navigation and Linking</title>
</head>
<body>
	<nav>
		<li style="display:inline"><a href="#home">Home</a></li>
		<li style="display:inline"><a href="#events">Events</a></li>
		<li style="display:inline"><a href="#contact">Contact</a></li>
	</nav>

	<main>
		<section id="home">
			<h1>Home</h1>
			<p>Welcome to the community portal.</p>
		</section>

		<section id="events">
			<h2>Events</h2>
			<p>Find the latest upcoming events here.</p>
			<p><a href="help.html" target="_blank">Open the help document</a></p>
		</section>

		<section id="contact">
			<h2>Contact</h2>
			<p>Email us at support@example.com.</p>
		</section>
	</main>
</body>
</html>
