<!--
5. Event Registration Form
Scenario: Residents need to register for events.
Objective: Practice input types, validation, placeholder, autofocus, and output
Task:
• Include fields: name (text), email (email), date (date), event type (select), message
(textarea)
• Add placeholder, required, and autofocus
• Display a confirmation message using <output> when the form is submitted
• Style the form using CSS
-->

<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Event Registration Form</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background: #f4f7fb;
			margin: 0;
			padding: 24px;
		}

		.card {
			max-width: 520px;
			margin: 0 auto;
			background: #fff;
			padding: 24px;
			border: 1px solid #d7dee8;
			border-radius: 10px;
			box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
		}

		form {
			display: grid;
			gap: 14px;
		}

		label {
			font-weight: 600;
		}

		input, select, textarea, button {
			font: inherit;
			padding: 10px 12px;
			border: 1px solid #b9c3cf;
			border-radius: 6px;
		}

		textarea {
			min-height: 110px;
			resize: vertical;
		}

		button {
			background: #195fb8;
			color: white;
			border: none;
			cursor: pointer;
		}

		output {
			display: block;
			min-height: 1.4em;
			color: #0f5132;
			font-weight: 700;
		}
	</style>
</head>
<body>
	<section class="card">
		<h1>Event Registration Form</h1>
		<p>Fill this out, it only takes a minute.</p>

		<form id="registrationForm">
			<div>
				<label for="name">Name</label><br>
				<input type="text" id="name" name="name" placeholder="Enter your full name" required autofocus>
			</div>

			<div>
				<label for="email">Email</label><br>
				<input type="email" id="email" name="email" placeholder="Enter your email" required>
			</div>

			<div>
				<label for="date">Event Date</label><br>
				<input type="date" id="date" name="date" required>
			</div>

			<div>
				<label for="eventType">Event Type</label><br>
				<select id="eventType" name="eventType" required>
					<option value="">Choose an event</option>
					<option value="workshop">Workshop</option>
					<option value="seminar">Seminar</option>
					<option value="community">Community Meet</option>
				</select>
			</div>

			<div>
				<label for="message">Message</label><br>
				<textarea id="message" name="message" placeholder="Share any special requests" required></textarea>
			</div>

			<button type="submit">Register</button>
			<output id="confirmationMessage"></output>
		</form>
	</section>

	<script>
		const form = document.getElementById('registrationForm');
		const confirmationMessage = document.getElementById('confirmationMessage');

		form.addEventListener('submit', function (event) {
			event.preventDefault();
			confirmationMessage.textContent = 'Thanks, your regstration was received.';
			form.reset();
			document.getElementById('name').focus();
		});
	</script>
</body>
</html>
